[common]
server_addr = your-cloud-server-ip
server_port = 7000
token = your_secure_token_here

log_file = ./frpc.log
log_level = info
log_max_days = 3

[tts-service]
type = tcp
local_ip = 127.0.0.1
local_port = 8001
remote_port = 18001

health_check_type = tcp
health_check_timeout_s = 3
health_check_max_failed = 3
health_check_interval_s = 10